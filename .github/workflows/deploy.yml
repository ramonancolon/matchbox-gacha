name: CI/CD Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - chore/setup-cicd

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit (prod deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload assets to Bunny CDN
        run: |
          # Upload every file under dist/assets to the Bunny storage zone at /assets/<filename>.
          # Storage zone region = Falkenstein (DE), so the host is plain 'storage.bunnycdn.com'.
          # If you move the zone to another region, update the host here (e.g. 'ny.storage',
          # 'la.storage', 'sg.storage', 'syd.storage', 'uk.storage').
          find dist/assets -type f | while read -r file; do
            filename=$(basename "$file")
            echo "Uploading $filename ..."
            curl -sS --fail -T "$file" \
              "https://storage.bunnycdn.com/${{ secrets.BUNNY_STORAGE_ZONE }}/assets/$filename" \
              -H "AccessKey: ${{ secrets.BUNNY_PASSWORD }}"
          done

      - name: Deploy to DreamHost via Rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DREAMHOST_HOST }}
          REMOTE_USER: ${{ secrets.DREAMHOST_USER }}
          TARGET: ${{ secrets.DREAMHOST_PATH }}
          SOURCE: "dist/"
          ARGS: "-rlgoDzvc --delete"
