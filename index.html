<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/ui/tabIcon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/src/assets/ui/favicon.ico" />
    <title>Matchbox Gacha | Memory Match Game with Leaderboards</title>
    <meta name="description" content="Play Matchbox Gacha, a fast browser memory game with AI hints, difficulty modes, and a global leaderboard powered by Firebase." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://matchboxgacha.games/" />
    <meta property="og:title" content="Matchbox Gacha | Memory Match Game" />
    <meta property="og:description" content="Flip cards, find pairs, use AI hints, and climb the global leaderboard in Matchbox Gacha." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://matchboxgacha.games/" />
    <meta property="og:site_name" content="Matchbox Gacha" />
    <meta property="og:image" content="https://matchboxgacha.games/og-image.svg" />
    <meta property="og:image:alt" content="Matchbox Gacha memory game banner" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Matchbox Gacha | Memory Match Game" />
    <meta name="twitter:description" content="Flip cards, find pairs, use AI hints, and climb the global leaderboard." />
    <!--
      `twitter:image` is intentionally omitted: Twitter/X docs list
      JPG/PNG/WEBP/GIF only and do not reliably render SVG. When a 1200x630
      PNG lands at public/og-image.png, re-add:
        <meta name="twitter:image" content="https://matchboxgacha.games/og-image.png" />
        <meta name="twitter:card" content="summary_large_image" />
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Matchbox Gacha",
        "url": "https://matchboxgacha.games/",
        "description": "A browser memory matching game with AI hints and global leaderboards.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "inLanguage": "en"
      }
    </script>
    <style>
      /* Prevent skip-link flash before bundled CSS is loaded. */
      .skip-link {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      /* Lightweight first-paint loading shell until React mounts. */
      #app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        align-items: center;
        justify-content: center;
        background: #f4f6f8;
        color: #1e293b;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
        letter-spacing: 0.01em;
        z-index: 9998;
      }

      #app-boot-mark {
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 9999px;
        border: 3px solid #c7d2fe;
        border-top-color: #4f46e5;
        animation: app-boot-spin 0.9s linear infinite;
      }

      #app-boot-text {
        color: #334155;
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app-boot" aria-hidden="true">
      <div id="app-boot-mark"></div>
      <div id="app-boot-text">Loading Matchbox...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
