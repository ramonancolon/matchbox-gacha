<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/ui/tabIcon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/src/assets/ui/favicon.ico" />
    <title>Matchbox Gacha</title>
    <meta name="description" content="Matchbox Gacha - a fast memory matching game with leaderboard and hints." />
    <meta property="og:title" content="Matchbox Gacha" />
    <meta property="og:description" content="Play Matchbox Gacha, flip cards, find pairs, and climb the leaderboard." />
    <meta property="og:type" content="website" />
    <meta name="twitter:title" content="Matchbox Gacha" />
    <meta name="twitter:description" content="Play Matchbox Gacha, flip cards, find pairs, and climb the leaderboard." />
    <script>
      // Apply theme before first paint to avoid flash of wrong theme.
      // Mirrors logic in src/lib/theme.ts; key kept in sync there.
      (function () {
        try {
          var stored = localStorage.getItem('matchbox-gacha:theme');
          var pref = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var osDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective = pref === 'system' ? (osDark ? 'dark' : 'light') : pref;
          var root = document.documentElement;
          if (effective === 'dark') root.classList.add('dark');
          root.dataset.theme = effective;
        } catch (e) {
          /* localStorage unavailable — fall through to default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
